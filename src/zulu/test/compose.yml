# Example Build with Compose
#   - podman-compose run -f compose.yml up
#   - docker compose run -f compose.yml up
---
services:
  payara:
    hostname: payara
    image: payara:compose
    build:
      context: ./../
      dockerfile: Dockerfile
      tags:
        - payara:dev
      secrets:
        - payara_admin_secret
      args:
        builder_image: docker.io/alpine/ansible:latest
        runtime_image: docker.io/azul/zulu-openjdk-debian:25-jre-headless
        bld_payara_version_major: "6"
        bld_payara_version_release: "2025.10"
        bld_activemq_rar_version: "6.1.8"
        bld_logback_delegation_version: "1.0.0"
        bld_logback_encoder_version: "9.0"
        bld_logback_libs_version: "1.0.0"
        bld_mssql_jdbc_version: "10.2.1"
        bld_postgres_jdbc_version: "42.3.6"
    ports:
      - 8080:8080
      - 4848:4848

# NOTE: podman-compose does NOT support this
secrets:
  payara_admin_secret:
    file: payara-admin-secret.txt
